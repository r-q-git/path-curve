<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Text Warper Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Fira+Code:wght@300;500;700&family=Montserrat:wght@100;400;900&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <style>
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .shape-active {
        border-color: #3b82f6 !important;
        background-color: #eff6ff;
      }
      .canvas-target svg {
        max-width: 100%;
        max-height: 100%;
        height: auto;
      }
      #floatingInputContainer {
        display: none;
        position: fixed;
        z-index: 100;
        width: 300px;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 h-screen w-screen flex overflow-hidden font-sans"
    onclick="handleOutsideClick(event)"
  >
    <aside
      id="sidebar"
      class="w-80 bg-white shadow-xl flex flex-col h-full z-40 border-r border-slate-200"
    >
      <div class="flex-1 overflow-y-auto p-5 space-y-6 no-scrollbar">
        <div
          class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100"
        >
          <label class="text-xs font-bold uppercase text-gray-500"
            >Show Guide Path</label
          >
          <button
            id="pathToggle"
            onclick="togglePath()"
            class="w-12 h-6 bg-blue-500 rounded-full relative transition-colors"
          >
            <div
              id="toggleCircle"
              class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full transition-all"
            ></div>
          </button>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-gray-500 mb-2"
            >Shapes</label
          >
          <div
            id="shapeCarousel"
            class="flex gap-3 overflow-x-auto py-2 no-scrollbar"
          ></div>
          <button
            onclick="triggerSvgUpload()"
            class="mt-2 w-full py-2 border-2 border-dashed border-slate-200 rounded-xl text-[10px] font-bold uppercase text-slate-400 hover:border-blue-400 hover:text-blue-500 transition-all"
          >
            Upload SVG (Extract Text & Path)
          </button>
          <input
            type="file"
            id="svgUploadInput"
            class="hidden"
            accept=".svg"
            onchange="handleSvgUpload(event)"
          />
        </div>

        <div class="space-y-4">
          <div class="bg-slate-900 p-3 rounded-xl text-white">
            <label class="block text-[10px] font-bold uppercase opacity-60 mb-2"
              >Text Orientation</label
            >
            <div class="flex gap-2">
              <button
                onclick="setTextSide('outside')"
                id="btnOutside"
                class="flex-1 py-1.5 rounded-lg text-[10px] font-bold bg-blue-600"
              >
                OUTSIDE
              </button>
              <button
                onclick="setTextSide('inside')"
                id="btnInside"
                class="flex-1 py-1.5 rounded-lg text-[10px] font-bold bg-slate-700"
              >
                INSIDE
              </button>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase text-gray-500 mb-1"
              >Font Family</label
            >
            <select
              id="fontFamily"
              class="w-full border-2 border-slate-100 rounded-xl p-2 text-sm bg-white"
            ></select>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-1"
                >Weight</label
              >
              <select
                id="fontWeight"
                class="w-full border-2 border-slate-100 rounded-xl p-2 text-sm bg-white"
              >
                <option value="100">Thin</option>
                <option value="400" selected>Regular</option>
                <option value="700">Bold</option>
                <option value="900">Extra Bold</option>
              </select>
            </div>
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-1"
                >Style</label
              >
              <select
                id="fontStyle"
                class="w-full border-2 border-slate-100 rounded-xl p-2 text-sm bg-white"
              >
                <option value="normal" selected>Normal</option>
                <option value="italic">Italic</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-1"
                >Size (px)</label
              >
              <input
                type="number"
                id="fontSize"
                value="24"
                class="w-full border-2 border-slate-100 rounded-xl p-2 text-sm"
              />
            </div>
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-1"
                >Anchor</label
              >
              <select
                id="textAnchor"
                class="w-full border-2 border-slate-100 rounded-xl p-2 text-sm bg-white"
              >
                <option value="start">Start</option>
                <option value="middle" selected>Middle</option>
                <option value="end">End</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-1"
                >Letter Spacing</label
              >
              <input
                type="number"
                id="letterSpacing"
                value="0"
                step="0.5"
                class="w-full border-2 border-slate-100 rounded-xl p-2 text-sm"
              />
            </div>
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-1"
                >Word Spacing</label
              >
              <input
                type="number"
                id="wordSpacing"
                value="0"
                step="0.5"
                class="w-full border-2 border-slate-100 rounded-xl p-2 text-sm"
              />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-1"
                >Stroke Width</label
              >
              <input
                type="number"
                id="strokeWidth"
                value="0"
                step="0.1"
                class="w-full border-2 border-slate-100 rounded-xl p-2 text-sm"
              />
            </div>
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-1"
                >Path Offset (%)</label
              >
              <input
                type="number"
                id="startOffset"
                value="50"
                min="0"
                max="100"
                class="w-full border-2 border-slate-100 rounded-xl p-2 text-sm"
              />
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase text-gray-500 mb-1"
              >Text Color</label
            >
            <input
              type="color"
              id="textColor"
              value="#0f172a"
              class="w-full h-[38px] border-2 border-slate-100 rounded-xl cursor-pointer p-1 bg-white"
            />
          </div>
        </div>

        <div class="space-y-4 pt-4 border-t border-slate-100">
          <label class="block text-xs font-bold uppercase text-gray-500"
            >Coordinate System (Viewport)</label
          >
          <div class="grid grid-cols-2 gap-2">
            <div>
              <span class="text-[10px] text-gray-400">ViewBox W</span
              ><input
                type="number"
                id="vbWidth"
                value="300"
                class="w-full border rounded-lg p-1.5 text-xs"
              />
            </div>
            <div>
              <span class="text-[10px] text-gray-400">ViewBox H</span
              ><input
                type="number"
                id="vbHeight"
                value="300"
                class="w-full border rounded-lg p-1.5 text-xs"
              />
            </div>
          </div>

          <label class="block text-xs font-bold uppercase text-gray-500 mt-2"
            >Export Size (Physical)</label
          >
          <div class="grid grid-cols-2 gap-2">
            <div>
              <span class="text-[10px] text-gray-400">Width (px)</span
              ><input
                type="number"
                id="exportWidth"
                value="800"
                class="w-full border rounded-lg p-1.5 text-xs"
              />
            </div>
            <div>
              <span class="text-[10px] text-gray-400">Height (px)</span
              ><input
                type="number"
                id="exportHeight"
                value="800"
                class="w-full border rounded-lg p-1.5 text-xs"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="p-4 border-t border-slate-100 bg-white space-y-2">
        <button
          onclick="downloadSVG()"
          class="w-full bg-black text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-slate-800 shadow-lg"
        >
          Download SVG
        </button>
        <button
          onclick="copyToClipboard()"
          class="w-full bg-slate-100 text-slate-600 py-2 rounded-lg font-bold text-[10px] uppercase"
        >
          Copy Base64
        </button>
      </div>
    </aside>

    <main
      class="flex-1 bg-slate-100 flex items-center justify-center p-10 relative"
    >
      <div
        id="canvasBox"
        class="canvas-target w-[600px] h-[600px] bg-white rounded-3xl shadow-2xl flex items-center justify-center overflow-hidden p-8 border-4 border-white"
      ></div>
      <div id="floatingInputContainer" onclick="event.stopPropagation()">
        <div class="bg-white p-4 rounded-2xl shadow-2xl border border-blue-200">
          <textarea
            id="floatingInput"
            rows="2"
            class="w-full border-2 border-blue-50 rounded-xl p-3 text-sm outline-none focus:border-blue-400 resize-none mb-2"
          ></textarea>
          <button
            onclick="hideEditing()"
            class="w-full py-2 bg-blue-600 text-white rounded-xl text-xs font-bold uppercase"
          >
            Update Text
          </button>
        </div>
      </div>
      <input type="hidden" id="userInput" value="Edit this text" />
    </main>

    <script>
      let shapesData = [];
      let fontsData = [];
      let showPath = true,
        selectedShapeId = "",
        textSide = "outside";

      async function init() {
        try {
          const [shapesRes, fontsRes] = await Promise.all([
            fetch("shapes.json"),
            fetch("fonts.json"),
          ]);
          shapesData = await shapesRes.json();
          fontsData = await fontsRes.json();
          if (shapesData.length > 0) selectedShapeId = shapesData[0].id;
          renderCarousel();
          renderFonts();
          updateSVG();
        } catch (err) {
          console.error("Data load error", err);
        }
      }

      function setTextSide(side) {
        textSide = side;
        document.getElementById("btnOutside").className =
          `flex-1 py-1.5 rounded-lg text-[10px] font-bold ${side === "outside" ? "bg-blue-600" : "bg-slate-700"}`;
        document.getElementById("btnInside").className =
          `flex-1 py-1.5 rounded-lg text-[10px] font-bold ${side === "inside" ? "bg-blue-600" : "bg-slate-700"}`;
        updateSVG();
      }

      function updateSVG() {
        const shape = shapesData.find((s) => s.id === selectedShapeId) || {
          d: "",
        };
        const vw = document.getElementById("vbWidth").value;
        const vh = document.getElementById("vbHeight").value;
        const baseline = textSide === "inside" ? "hanging" : "auto";

        const svg = `
          <svg id="mainSvg" width="100%" height="100%" viewBox="0 0 ${vw} ${vh}" xmlns="http://www.w3.org/2000/svg">
            <defs><path id="warp_path" d="${shape.d}" /></defs>
            <path id="guide" d="${shape.d}" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="0" style="display: ${showPath ? "block" : "none"}" />
            <text fill="${document.getElementById("textColor").value}" 
                  stroke="${document.getElementById("textColor").value}"
                  stroke-width="${document.getElementById("strokeWidth").value}"
                  text-anchor="${document.getElementById("textAnchor").value}"
                  dominant-baseline="${baseline}"
                  onclick="showEditing(event)"
                  style="font-size:${document.getElementById("fontSize").value}px; 
                         font-family:${document.getElementById("fontFamily").value}; 
                         font-weight:${document.getElementById("fontWeight").value}; 
                         font-style:${document.getElementById("fontStyle").value};
                         letter-spacing:${document.getElementById("letterSpacing").value}px;
                         word-spacing:${document.getElementById("wordSpacing").value}px;
                         cursor: pointer;">
              <textPath href="#warp_path" startOffset="${document.getElementById("startOffset").value}%">${document.getElementById("userInput").value}</textPath>
            </text>
          </svg>`;
        document.getElementById("canvasBox").innerHTML = svg;
      }

      // Rest of original logic for Uploads and Export remains the same
      function renderCarousel() {
        const c = document.getElementById("shapeCarousel");
        c.innerHTML = shapesData
          .map(
            (s) => `
          <div onclick="setShape('${s.id}')" class="flex-shrink-0 w-16 h-16 border-2 rounded-lg cursor-pointer flex items-center justify-center p-1.5 transition-all ${s.id === selectedShapeId ? "shape-active" : "border-slate-100"}">
            <svg viewBox="0 0 300 300" class="w-full h-full"><path d="${s.d}" fill="none" stroke="#64748b" stroke-width="15"/></svg>
          </div>`,
          )
          .join("");
      }

      function renderFonts() {
        const select = document.getElementById("fontFamily");
        select.innerHTML = fontsData
          .map((f) => `<option value="${f.value}">${f.name}</option>`)
          .join("");
      }

      function triggerSvgUpload() {
        document.getElementById("svgUploadInput").click();
      }

      function handleSvgUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(e.target.result, "image/svg+xml");
          const textEl =
            doc.querySelector("text") || doc.querySelector("tspan");
          if (textEl)
            document.getElementById("userInput").value =
              textEl.textContent.trim();
          const path = doc.querySelector("path");
          if (path) {
            const newId = "custom-" + Date.now();
            shapesData.push({
              id: newId,
              name: "Uploaded",
              d: path.getAttribute("d"),
            });
            selectedShapeId = newId;
            renderCarousel();
          }
          updateSVG();
        };
        reader.readAsText(file);
      }

      function togglePath() {
        showPath = !showPath;
        document.getElementById("pathToggle").style.backgroundColor = showPath
          ? "#3b82f6"
          : "#cbd5e1";
        document.getElementById("toggleCircle").style.right = showPath
          ? "4px"
          : "24px";
        updateSVG();
      }

      function setShape(id) {
        selectedShapeId = id;
        renderCarousel();
        updateSVG();
      }

      function downloadSVG() {
        const svgClone = document.getElementById("mainSvg").cloneNode(true);
        const ew = document.getElementById("exportWidth").value;
        const eh = document.getElementById("exportHeight").value;
        svgClone.setAttribute("width", ew);
        svgClone.setAttribute("height", eh);
        if (!showPath) {
          const guide = svgClone.getElementById("guide");
          if (guide) guide.remove();
        }
        const svgContent = new XMLSerializer().serializeToString(svgClone);
        const blob = new Blob([svgContent], {
          type: "image/svg+xml;charset=utf-8",
        });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `text-warp-export.svg`;
        link.click();
      }

      function copyToClipboard() {
        const svgClone = document.getElementById("mainSvg").cloneNode(true);
        svgClone.setAttribute(
          "width",
          document.getElementById("exportWidth").value,
        );
        svgClone.setAttribute(
          "height",
          document.getElementById("exportHeight").value,
        );
        const svgContent = new XMLSerializer().serializeToString(svgClone);
        navigator.clipboard.writeText(
          `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svgContent)))}`,
        );
      }

      function showEditing(event) {
        event.stopPropagation();
        const container = document.getElementById("floatingInputContainer");
        container.style.display = "block";
        container.style.left = `${event.clientX - 150}px`;
        container.style.top = `${event.clientY - 50}px`;
        document.getElementById("floatingInput").value =
          document.getElementById("userInput").value;
      }

      function hideEditing() {
        document.getElementById("floatingInputContainer").style.display =
          "none";
        updateSVG();
      }
      function handleOutsideClick() {
        if (
          document.getElementById("floatingInputContainer").style.display ===
          "block"
        )
          hideEditing();
      }

      document
        .getElementById("floatingInput")
        .addEventListener("input", (e) => {
          document.getElementById("userInput").value = e.target.value;
          updateSVG();
        });

      document
        .querySelectorAll("input, select")
        .forEach((el) => el.addEventListener("input", updateSVG));
      window.onload = init;
    </script>
  </body>
</html>
